services:
  - type: web
    name: shomeus-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: shomeus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shomeus-redis
          type: redis
          property: connectionString

databases:
  - name: shomeus-db
    databaseName: shomeus_production
    user: shomeus_user
    plan: standard
    region: oregon

redis:
  - name: shomeus-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
